<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>슥 · 작가 스튜디오 데모</title>

<!-- Pretendard -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
/* Paperlogy (brand) — 로드 실패 시 Pretendard로 폴백 */
@font-face{font-family:'Paperlogy';font-weight:400;src:url('https://cdn.jsdelivr.net/gh/wnsrj0210/paperlogy@main/Paperlogy-4Regular.woff2') format('woff2');font-display:swap;}
@font-face{font-family:'Paperlogy';font-weight:500;src:url('https://cdn.jsdelivr.net/gh/wnsrj0210/paperlogy@main/Paperlogy-5Medium.woff2') format('woff2');font-display:swap;}
@font-face{font-family:'Paperlogy';font-weight:700;src:url('https://cdn.jsdelivr.net/gh/wnsrj0210/paperlogy@main/Paperlogy-7Bold.woff2') format('woff2');font-display:swap;}

:root{
  --surface:#fafafa; --surface-container:#f5f5f5; --white:#fff;
  --chacole:#2a2a2a; --on-surface:#2a2a2a; --gray900:#2a2a2a;
  --dust:#979797; --neutral:#979797; --gray700:#979797;
  --outline-light:#e4e4e4; --outline-dark:#525252;
  --primary:#a100ff; --violet:#a100ff; --accent:#00a43e; --black:#000;
}
*{margin:0;padding:0;box-sizing:border-box;}
*::-webkit-scrollbar{display:none;width:0;height:0;}
*{scrollbar-width:none;-ms-overflow-style:none;}
html{zoom:1.05;}   /* 살짝 확대 */
html,body{width:100%;height:100%;background:var(--surface);overflow:hidden;
  font-family:'Pretendard',-apple-system,sans-serif;}
.brand{font-family:'Paperlogy','Pretendard',sans-serif;}

/* ---- 뷰포트를 꽉 채우는 반응형: 고정 캔버스 없이 100vw x 100vh ---- */
#viewport{position:fixed;inset:0;background:var(--surface);overflow:hidden;}
#stage{width:100%;height:100%;position:relative;overflow:hidden;}

.screen{position:absolute;inset:0;background:var(--surface);display:none;flex-direction:column;}
.screen.active{display:flex;}

/* ---- 팝업 오버레이(이전 화면 위에 덮임) ---- */
.overlay{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;}
.overlay.loading{background:rgba(255,255,255,.8);}
.overlay.preview{background:rgba(0,0,0,.8);cursor:pointer;}
.overlay.loading-new{background:rgba(255,255,255,.8);perspective:800px;}
.overlay.loading-new .ln-logo{color:var(--on-surface);transform-style:preserve-3d;animation:lnSpin 1.4s linear infinite;}
@keyframes lnSpin{from{transform:rotateY(0deg);}to{transform:rotateY(360deg);}}

/* ---- 공통: head / navigation ---- */
.head{height:72px;flex:0 0 auto;background:var(--surface);border-bottom:1px solid var(--outline-light);
  display:flex;align-items:center;justify-content:space-between;padding:11px 32px;}
.nav{flex:0 0 auto;background:var(--surface);display:flex;align-items:center;justify-content:space-between;padding:12px 32px;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:4px;
  font-family:'Paperlogy','Pretendard',sans-serif;font-size:12px;line-height:normal;cursor:pointer;background:none;
  border:1px solid var(--outline-light);color:var(--chacole);white-space:nowrap;}
.btn.violet{background:var(--violet);color:#fff;border-color:var(--violet);}
.btn.violet-line{border-color:var(--violet);color:var(--violet);}
.btn.sm{padding:8px 12px;}
.btn .ic{width:12px;height:12px;display:block;}
/* ---- UX: 호버는 dim 효과만 ---- */
.btn,.proj-btn,.strip .sc,.avatar-row .av,.voice-box .play{transition:opacity .15s;cursor:pointer;}
.btn:hover,.proj-btn:hover,.strip .sc:hover,.avatar-row .av:hover,.voice-box .play:hover{opacity:.7;}
.write-card .ph-title,.write-card .ph-sub,.write-card .ph-body{caret-color:#000;}
/* ---- UX: 팝업 등장 애니메이션 (페이지 이동은 효과 없음) ---- */
@keyframes ovIn{from{opacity:0;}to{opacity:1;}}
@keyframes ovPop{from{opacity:0;transform:scale(.985);}to{opacity:1;transform:none;}}
.overlay{animation:ovIn .2s ease both;}
.overlay .load-box,.overlay .frame{animation:ovPop .26s cubic-bezier(.2,.7,.3,1) both;}

.proj-btn{display:inline-flex;align-items:center;gap:8px;padding:12px;border:1px solid var(--outline-light);
  border-radius:4px;font-family:'Paperlogy','Pretendard',sans-serif;font-size:12px;color:var(--chacole);}
.head-right{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex:1;min-width:0;}
.counter{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--dust);}
.counter b{color:var(--primary);font-weight:400;}

/* stepper */
.steps{display:flex;align-items:center;gap:8px;}
.step{display:flex;align-items:center;gap:8px;}
.step .dot{width:20px;height:20px;border-radius:999px;display:flex;align-items:center;justify-content:center;
  font-family:'Paperlogy','Pretendard',sans-serif;font-size:10px;color:#fff;background:var(--dust);}
.step .lbl{font-family:'Paperlogy','Pretendard',sans-serif;font-size:12px;color:var(--dust);}
.step.done .dot{background:transparent;border:1px solid var(--accent);color:var(--accent);}
.step.done .lbl{color:var(--accent);}
.step.cur .dot{background:var(--accent);color:#fff;}
.step.cur .lbl{color:var(--accent);}
.sep{width:12px;height:12px;color:var(--dust);display:flex;align-items:center;justify-content:center;}

/* ---- write ---- */
.contents{flex:1 1 0;min-height:0;display:flex;flex-direction:column;}
.write .contents{background:var(--surface);padding:0 max(24px,calc((100% - 880px)/2));overflow-y:auto;justify-content:flex-start;}
.write-card{flex:0 0 auto;background:var(--white);padding:40px;display:flex;flex-direction:column;gap:24px;}
.write-card .ph-title{font-family:'Pretendard';font-weight:700;font-size:24px;color:var(--chacole);width:100%;border:none;outline:none;background:none;}
.write-card .ph-sub{font-family:'Pretendard';font-weight:400;font-size:16px;color:var(--chacole);width:100%;border:none;outline:none;background:none;}
.write-card hr{border:none;border-top:1px solid var(--outline-light);width:100%;}
.write-card .ph-body{font-family:'Pretendard';font-weight:400;font-size:14px;line-height:1.7;color:var(--chacole);width:100%;
  border:none;outline:none;background:none;resize:none;overflow:hidden;min-height:20px;}
.write-card .ph-body::placeholder{color:var(--dust);}
/* 본문 인물 이름 박스 강조 — textarea 뒤에 하이라이트 오버레이 */
.editor{position:relative;width:100%;}
.editor .hl{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;color:transparent;
  font-family:'Pretendard';font-weight:400;font-size:14px;line-height:1.7;
  white-space:pre-wrap;word-break:break-word;overflow-wrap:break-word;}
.editor .hl mark{background:none;color:transparent;text-decoration:underline;text-decoration-thickness:1.5px;text-underline-offset:3px;}
.editor .hl mark.mk-name{text-decoration-color:var(--primary);}   /* 인물 */
.editor .hl mark.mk-emo{text-decoration-color:var(--dust);}       /* 감정 표현 */
.editor .hl mark.mk-place{text-decoration-color:var(--accent);}   /* 장소 묘사 */
.editor .ph-body{position:relative;z-index:1;}
/* 실시간 분석 바 (카드 하단) — 그라데이션 흐름 애니메이션 */
.analyze-bar{position:relative;overflow:hidden;display:flex;align-items:center;gap:10px;width:100%;padding:16px;border-radius:4px;
  border:1px solid var(--outline-light);background:linear-gradient(to right,#f5f5f5,rgba(245,245,245,0));}
.analyze-bar::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.85) 50%,transparent 100%);
  background-size:60% 100%;background-repeat:no-repeat;animation:abSheen 2.2s linear infinite;}
@keyframes abSheen{0%{background-position:-70% 0;}100%{background-position:170% 0;}}
.analyze-bar>*{position:relative;z-index:1;}
.analyze-bar .ab-left{flex:1;min-width:0;display:flex;align-items:center;gap:8px;
  font-family:'Paperlogy','Pretendard',sans-serif;font-weight:500;font-size:12px;color:var(--chacole);}
.analyze-bar .ab-left .bars{display:inline-flex;gap:2px;align-items:center;height:12px;flex:0 0 auto;}
.analyze-bar .ab-left .bars i{width:2px;height:12px;border-radius:1px;background:var(--primary);transform-origin:center;animation:barEq 1s ease-in-out infinite;}
.analyze-bar .ab-left .bars i:nth-child(2){animation-delay:.15s;}
.analyze-bar .ab-left .bars i:nth-child(3){animation-delay:.3s;}
.analyze-bar .ab-left .bars i:nth-child(4){animation-delay:.45s;}
@keyframes barEq{0%,100%{transform:scaleY(.3);}50%{transform:scaleY(1);}}
.analyze-bar .ab-right{flex:0 0 auto;padding:8px;border-radius:4px;background:#ececec;white-space:nowrap;
  font-family:'Paperlogy','Pretendard',sans-serif;font-weight:400;font-size:12px;color:var(--dust);opacity:0;transition:opacity .4s;}
.analyze-bar .ab-right.show{opacity:1;}
.write-card .ph-title::placeholder,.write-card .ph-sub::placeholder{color:var(--dust);}

/* ---- loading (popup) ---- */
.load-box{display:flex;flex-direction:column;align-items:center;gap:40px;text-align:center;}
.load-box .lt{font-family:'Paperlogy','Pretendard',sans-serif;font-weight:700;font-size:24px;color:var(--chacole);}
.load-box .ls{font-family:'Paperlogy','Pretendard',sans-serif;font-weight:400;font-size:16px;color:var(--dust);margin-top:16px;white-space:nowrap;}
/* 로딩 플립카드: 인물 이름 타이핑 → 뒤집어서 얼굴 공개 → 반복 */
.load-card{width:240px;height:240px;perspective:1000px;}
.lc-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .9s cubic-bezier(.2,.7,.3,1);}
.lc-inner.flipped{transform:rotateY(180deg);}
.lc-front,.lc-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.lc-front{background:var(--surface-container);
  font-family:'Paperlogy','Pretendard',sans-serif;font-weight:700;font-size:30px;color:var(--chacole);}
.lc-front .caret{display:inline-block;width:2px;height:34px;background:#000;margin-left:3px;vertical-align:middle;
  animation:caretBlink 1.1s steps(1) infinite;}
@keyframes caretBlink{50%{opacity:0;}}
.lc-back{transform:rotateY(180deg);}
.lc-back .face{position:absolute;inset:0;}
.load-steps{display:flex;flex-direction:column;gap:16px;align-items:flex-start;}
.load-steps .ls-item{display:flex;align-items:center;gap:8px;font-family:'Paperlogy','Pretendard',sans-serif;font-weight:400;font-size:16px;color:var(--dust);opacity:.4;transition:.3s;}
.load-steps .ls-item .c{width:20px;height:20px;border-radius:999px;background:var(--dust);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:10px;}
.load-steps .ls-item.on{opacity:1;color:var(--accent);}
.load-steps .ls-item.on .c{background:var(--accent);}

/* ---- casting ---- */
.casting .contents{padding:0 max(24px,calc((100% - 880px)/2));}
.cast-inner{flex:1;min-height:0;padding:20px 40px 40px;display:flex;flex-direction:column;gap:24px;overflow-y:auto;}
.title-blk{display:flex;flex-direction:column;gap:8px;width:100%;}
.title-blk .t{font-family:'Paperlogy','Pretendard',sans-serif;font-weight:700;font-size:24px;color:var(--on-surface);}
.title-blk .s{font-family:'Paperlogy','Pretendard',sans-serif;font-weight:400;font-size:12px;color:var(--dust);}
.avatar-row{display:flex;gap:8px;align-items:center;width:100%;}
.avatar-row .av{width:66px;height:66px;border-radius:999px;border:1px solid var(--outline-light);overflow:hidden;}
.avatar-row .av.dash{border-style:dashed;display:flex;align-items:center;justify-content:center;color:var(--dust);font-size:18px;background:none;}
.cards{display:flex;flex-direction:column;gap:16px;width:100%;}
.profile{display:flex;gap:16px;height:304px;width:100%;}
.profile .imgs{display:flex;gap:10px;height:100%;align-items:center;}
.profile .thumbs{display:flex;flex-direction:column;gap:8px;height:100%;overflow:hidden;}
.profile .thumbs .th{width:86px;height:86px;border-radius:4px;}
.profile .main-img{width:304px;height:100%;border-radius:4px;}
.profile .meta{flex:1;min-width:0;height:100%;display:flex;flex-direction:column;justify-content:space-between;}
.profile .meta-top{flex:1;display:flex;flex-direction:column;gap:16px;padding-bottom:16px;}
.profile .nm{font-family:'Paperlogy','Pretendard',sans-serif;font-weight:700;font-size:14px;color:#2a2a2a;}
.chips{display:flex;gap:4px;align-items:center;}
.chip{display:flex;gap:2px;align-items:center;padding:4px;border-radius:4px;background:var(--on-surface);color:#fff;font-size:12px;}
.chip .star{width:12px;height:12px;display:inline-block;}
.prompt-box{flex:1;background:var(--surface-container);border:1px solid var(--outline-light);border-radius:4px;
  padding:16px;display:flex;flex-direction:column;gap:12px;font-size:12px;}
.prompt-box .pl{font-family:'Paperlogy','Pretendard',sans-serif;color:var(--on-surface);}
.prompt-box .pt{font-family:'Pretendard';color:var(--neutral);line-height:1.4;}
.voice-box{background:var(--white);border-radius:4px;padding:8px;display:flex;align-items:center;justify-content:space-between;}
.voice-box .play{width:24px;height:24px;border-radius:999px;border:.5px solid var(--outline-light);background:#fff;
  display:flex;align-items:center;justify-content:center;color:#2a2a2a;}
.voice-box .wave{flex:1;height:1px;background:repeating-linear-gradient(90deg,var(--outline-light) 0 2px,transparent 2px 6px);margin-left:8px;}
.meta-foot{display:flex;align-items:center;justify-content:space-between;width:100%;}

/* ---- video ---- */
.video .contents{background:#000;flex-direction:row;align-items:stretch;padding:0;overflow:hidden;}
/* 좌: 디테일 패널 */
.v-panel{background:#212121;width:430px;flex:0 0 auto;height:100%;padding:40px;display:flex;flex-direction:column;justify-content:space-between;}
.v-top{flex:1;min-height:0;display:flex;flex-direction:column;gap:16px;padding-bottom:16px;overflow:hidden;}
.v-dropdown{background:#1b1b1b;border:1px solid var(--outline-dark);border-radius:4px;padding:16px;display:flex;align-items:center;
  justify-content:space-between;gap:8px;color:#fff;font-family:'Paperlogy','Pretendard',sans-serif;font-size:16px;cursor:pointer;}
.v-dropdown .chev{display:flex;align-items:center;justify-content:center;width:12px;height:12px;color:#fff;flex:0 0 auto;}
.v-details{flex:1;min-height:0;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.v-card{background:#1b1b1b;border:1px solid var(--outline-dark);border-radius:4px;padding:16px;display:flex;flex-direction:column;gap:12px;font-size:12px;}
.v-card .lbl{font-family:'Paperlogy','Pretendard',sans-serif;font-weight:400;color:var(--gray700);}
.v-card .val{font-family:'Pretendard';color:#fff;line-height:1.4;}
.v-card .hdr{display:flex;align-items:center;justify-content:space-between;font-family:'Paperlogy','Pretendard',sans-serif;font-size:12px;color:var(--gray700);}
.v-card .hdr .cnt{font-size:10px;}
.v-places{display:flex;gap:8px;align-items:center;}
.v-places .pl{width:56px;height:56px;border-radius:999px;}
.btn.gen{width:100%;border:none;color:#fff;background:linear-gradient(270deg,#a100ff,#00e567,#a100ff);
  background-size:200% 200%;animation:genFlow 4s ease infinite;}
@keyframes genFlow{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.btn:disabled{cursor:default;}
.btn.gen:disabled{background:#3a3a3a;color:#8a8a8a;animation:none;opacity:1;}
/* 우: 영상 + 세로 썸네일 */
.v-right{flex:1;min-width:0;height:100%;padding:40px;display:flex;gap:24px;align-items:center;overflow:hidden;}
.v-video{flex:1;min-width:0;aspect-ratio:670/480;max-height:100%;border:1px solid var(--outline-dark);border-radius:4px;position:relative;overflow:hidden;}
.v-video .cap{position:absolute;left:50%;bottom:19px;transform:translateX(-50%);background:rgba(0,0,0,.8);
  padding:8px;color:#fff;font-family:'Pretendard';font-weight:700;font-size:14px;white-space:nowrap;}
.v-strip{display:flex;flex-direction:column;gap:8px;height:100%;overflow:hidden;flex:0 0 auto;}
.v-strip .sc{width:130px;height:86px;flex:0 0 auto;border:1px solid var(--outline-dark);border-radius:4px;position:relative;overflow:hidden;cursor:pointer;}
.v-strip .sc.sel{border-color:var(--violet);}
.v-strip .sc .badge{position:absolute;left:0;top:0;background:var(--outline-dark);color:#fff;font-family:'Paperlogy','Pretendard',sans-serif;
  font-size:12px;padding:4px 7px;border-bottom-right-radius:4px;}
.v-strip .sc.sel .badge{background:var(--violet);}
.v-strip .sc.gen{animation:none;}

/* ---- preview (popup) ---- */
.preview .frame{width:min(946px, calc(100vw - 80px), calc((100vh - 80px) * 946 / 626));aspect-ratio:946/626;height:auto;
  border:1px solid var(--outline-dark);border-radius:4px;overflow:hidden;position:relative;cursor:default;}
.preview .frame .cap{position:absolute;left:50%;bottom:19px;transform:translateX(-50%);background:rgba(0,0,0,.8);
  padding:8px;color:#fff;font-family:'Pretendard';font-weight:700;font-size:14px;}

/* 스켈레톤 UI (로딩 전 이미지/비디오 자리) */
@keyframes skel{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.ph-fill{background:linear-gradient(90deg,#e9e9e9 25%,#f4f4f4 50%,#e9e9e9 75%);background-size:200% 100%;animation:skel 1.4s linear infinite;}
.ph-dark{background:linear-gradient(90deg,#232323 25%,#343434 50%,#232323 75%);background-size:200% 100%;animation:skel 1.4s linear infinite;}
.gen-fill{background:linear-gradient(135deg,#3a2150,#102a1c);}

.icon{display:inline-block;vertical-align:middle;}
</style>
</head>
<body>
<div id="viewport"><div id="stage"></div></div>

<script>
/* ===== 아이콘 ===== */
const IC = {
  book:`<svg class="icon" width="11" height="12" viewBox="0 0 9.49231 10.6" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8.99231 7.14615H1.97692C1.16124 7.14615 0.5 7.80739 0.5 8.62308M8.99231 7.14615V9.36154C8.99231 9.76938 8.66169 10.1 8.25385 10.1H1.97692C1.16124 10.1 0.5 9.43876 0.5 8.62308M8.99231 7.14615V1.23846C8.99231 0.83062 8.66169 0.5 8.25385 0.5H2.9M0.5 8.62308V1.97692C0.5 1.16124 1.16124 0.5 1.97692 0.5H2.9M2.9 7.1V0.5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  arrow:`<svg class="icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>`,
  check:`<svg class="icon" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>`,
  import:`<svg class="icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>`,

function stepper(cur){ // cur: 1 write, 2 video(영상화/casting), 3 영상편집/업로드

/* ===== 라우터 ===== */
const BASES = { write:viewWrite, casting:viewCasting, video:viewVideo };
const OVERLAYS = { loading:viewLoading, preview:viewPreview, loadingNew:viewLoadingNew };
function render(){
  loadTimers.forEach(clearTimeout); loadTimers=[];   // 이전 로딩 애니메이션 정리
  if(loadInterval){ clearInterval(loadInterval); loadInterval=null; }
  let html = BASES[state.base]();
  if(state.overlay) html += OVERLAYS[state.overlay]();
  document.getElementById("stage").innerHTML = html; afterRender(); save();
}
/* 새로고침해도 같은 화면 유지 — 상태를 sessionStorage에 저장/복원 */
function save(){
  try{ sessionStorage.setItem("ssg-demo", JSON.stringify({
    base:state.base, overlay:(state.overlay==="loading"||state.overlay==="loadingNew")?null:state.overlay,
    scene:state.scene, gen:state.gen, typed:state.typed
  })); }catch(e){}
}
/* ===== 브라우저 히스토리 기반 화면 이동 (뒤로/앞으로 가기) ===== */
function navigate(base, overlay){          // 새 히스토리 항목 추가
  state.base=base; state.overlay=overlay||null;
  history.pushState({base:state.base, overlay:state.overlay}, "");
  render();
}
function replaceNav(base, overlay){        // 현재 항목 교체(뒤로가기에서 건너뜀)
  state.base=base; state.overlay=overlay||null;
  history.replaceState({base:state.base, overlay:state.overlay}, "");
  render();
}
function go(base){ navigate(base, null); }
function goWithLoading(base){               // 페이지 이동 시 로딩 팝업 잠깐 표시
  state.overlay="loadingNew"; render();
  loadTimers.push(setTimeout(()=>navigate(base, null), 2000));
}
function openOverlay(o){ navigate(state.base, o); }
function closeOverlay(){ history.back(); }  // 뒤로가기로 닫고, 앞으로가기로 복원
window.addEventListener("popstate", e=>{
  const s = e.state || {base:"write", overlay:null};
  state.base=s.base; state.overlay=s.overlay; render();
});

let loadInterval=null;
function startLoadCardAnim(){
  let ci=0;
  function cycle(){
    const inner=document.getElementById("lcInner"); if(!inner) return;   // 화면 떠남 → 중단
    const c=LOAD_CHARS[ci%LOAD_CHARS.length];
    inner.classList.remove("flipped");
    const nameEl=document.getElementById("lcName"); if(nameEl) nameEl.textContent="";
    let i=0;
    (function type(){
      const n=document.getElementById("lcName"); if(!n) return;
      n.textContent=c.name.slice(0,i);
      if(i<c.name.length){ i++; loadTimers.push(setTimeout(type,260)); }
      else loadTimers.push(setTimeout(()=>{                 // 이름 다 써지면 뒤집기
        const inr=document.getElementById("lcInner"); if(!inr) return;
        const back=document.getElementById("lcBack");
        if(back) back.innerHTML='<div class="face" style="background:'+c.grad+'"></div>';  // 이미지엔 텍스트 X
        inr.classList.add("flipped");
        ci++;
        loadTimers.push(setTimeout(cycle,2400));            // 얼굴 유지 후 다음 인물
      },900));
    })();
  }
  cycle();
}

function afterRender(){
  if(state.overlay==="loading"){
    startLoadCardAnim();   // 인물 이름 타이핑 → 카드 뒤집어 얼굴 공개 → 반복
    [0,1,2].forEach(i=>loadTimers.push(setTimeout(()=>document.getElementById("ls"+i)?.classList.add("on"), 1500+i*3000)));
    // 분석 완료 → loading 항목을 casting으로 교체(뒤로가기 시 write로 바로)
    loadTimers.push(setTimeout(()=>{ if(state.overlay==="loading") replaceNav("casting", null); }, 11000));
  }
  if(state.base==="write" && state.typed){ // 샘플 유지
    document.getElementById("wTitle").value=SAMPLE_TITLE;
    document.getElementById("wSub").value=SAMPLE_SUB;
    document.getElementById("wBody").value=SAMPLE_BODY;
    document.getElementById("wTitle").style.color="var(--chacole)";
    document.getElementById("wSub").style.color="var(--chacole)";
    updateCount(); autoGrow(document.getElementById("wBody")); renderHL();
  }
}
function fillSample(){
  document.getElementById("wTitle").value=SAMPLE_TITLE;
  document.getElementById("wSub").value=SAMPLE_SUB;
  document.getElementById("wBody").value=SAMPLE_BODY;
  document.getElementById("wTitle").style.color="var(--chacole)";
  document.getElementById("wSub").style.color="var(--chacole)";
  state.typed=true; updateCount(); autoGrow(document.getElementById("wBody")); renderHL();
}
function updateCount(){
  const b=document.getElementById("wBody"); if(!b)return;
  const n=b.value.replace(/\s/g,"").length;
  document.getElementById("cnt").textContent=n.toLocaleString()+"자";
}
function autoGrow(el){ if(!el)return; el.style.height="auto"; el.style.height=el.scrollHeight+"px"; }
/* 본문 등장인물 추정 → 박스 강조 */
const SEED_NAMES = ["내관 상선","윤도하","이훤","상선","진문영","한도현"]; // 시드(항상 인식)
const NAME_STOP = new Set(("그 그녀 그것 그곳 그때 이것 저것 우리 너희 당신 자신 자기 모두 누구 누군가 무엇 사람 사람들 자들 "
 +"오늘 내일 어제 지금 다시 천천 아무 정말 너무 가장 매우 모든 어떤 무슨 이런 저런 그런 하나 마음 생각 사랑 시간 세상 세계 "
 +"나라 마을 거리 하늘 바다 바닥 바람 얼굴 머리 가슴 어깨 눈빛 목소리 시선 표정 미소 순간 모습 자리 정전 황궁 궁궐 신하 "
 +"전하 폐하 옥새 옥좌 왕좌 횃불 불빛 조명 무대 거울 청년 시대 사방 막내 연습실 콧날 턱선 피부 기품 비주얼 남성 여성 한국인 "
 +"케이팝 아이돌 스튜디오 카메라 사진 화보 영화 드라마 영상 원고 소설 작품 출연진 인물 장면 장소 프롬프트 제목 부제목 "
 +"한참 한번 한순 한동 한쪽 한마디 조금 조용 정말 정도 전부 전혀 오늘 오직 이것 이곳 이때 이제 이미 장면 신하 전하 조명 "
 +"안색 남자 고개 구름 최고 최선 서로 권력 임금 임시 문득 문제 양손 백성 심장 박수 황급 황금 강의 강물 강조 정신 정성 "
 +"손님 배경 고요 고집 강산 정원 손길 손끝 임무 안내 안부 우선 구석 민망 노력 하인 차마 차츰 주변 주위 구분 성격 성문").split(" "));
// 장소 묘사(green) / 감정 표현(회색) 키워드
const PLACES = new Set(("황궁 정전 궁궐 궁 연습실 무대 옥좌 침전 대전 복도 광장 거리 마을 바다 바닷가 강가 호숫가 "
 +"하늘 숲 골목 정원 성벽 성문 객실 회의실 사무실 옥상 계단 거실 방 카페 학교 교실 병원 공원").split(" "));
const EMOS = new Set(("기쁨 슬픔 분노 두려움 공포 외로움 설렘 절망 희망 사랑 미움 증오 후회 그리움 불안 초조 안도 행복 "
 +"우울 서러움 환희 긴장 수치 부끄러움 당황 놀람 떨림 두근 한숨 눈물 분함 서글픔 벅참 묘함 안타까움").split(" "));
// 한국 성씨 (이름 첫 글자 판별용)
const SURNAMES = "김이박최정강조윤장임한오서신권황안송류전홍고문양손배백허유남심노하곽성차주우구민";
// 조사 (긴 것 먼저) — 인물 후보는 조사로 끝나야 함
const JOSA = ["에게서","으로서","으로써","한테서","에게","에서","한테","으로","이라고","이라는","처럼","보다","마다","까지","부터","조차","밖에","라고","라는","이랑","은","는","이","가","을","를","에","의","도","만","와","과","로","께","야","아"];
function nameBase(word){            // 조사로 끝나면 떼어내고 어간 반환, 아니면 null
  let w=word, hit=false;
  for(const p of JOSA){ if(w.length>p.length && w.endsWith(p)){ w=w.slice(0,-p.length); hit=true; break; } }
  if(w.endsWith("들") && w.length>1){ w=w.slice(0,-1); }   // 복수 접미사
  return hit ? w : null;
}
function escHtml(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escReg(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }
function renderHL(){
  const b=document.getElementById("wBody"), hl=document.getElementById("wHL"); if(!b||!hl) return;
  const text=b.value;
  // 인물 추정: 시드 + (성씨로 시작 & 조사로 끝남 & 흔한 단어 아님)
  const names=new Set(SEED_NAMES);
  (text.match(/[가-힣]+/g)||[]).forEach(word=>{
    const base=nameBase(word);
    if(base && base.length>=2 && base.length<=3 && SURNAMES.includes(base[0])
       && !NAME_STOP.has(base) && !PLACES.has(base) && !EMOS.has(base)) names.add(base);
  });
  // 용어 → 분류 (인물 > 장소 > 감정)
  const cls=new Map();
  EMOS.forEach(t=>cls.set(t,"mk-emo"));
  PLACES.forEach(t=>cls.set(t,"mk-place"));
  names.forEach(t=>{ if(t) cls.set(t,"mk-name"); });
  const terms=[...cls.keys()].sort((a,b)=>b.length-a.length);
  let html=escHtml(text);
  if(terms.length) html=html.replace(new RegExp("("+terms.map(escReg).join("|")+")","g"),
    (mm)=>'<mark class="'+cls.get(mm)+'">'+mm+'</mark>');
  hl.innerHTML=html;
  // 분석 바: 새로 등장한 인물/장소만(중복 제외) 알림
  const presentNames=[...names].filter(nm=>nm && text.includes(nm));
  const presentPlaces=[...PLACES].filter(p=>text.includes(p));
  const newN=presentNames.filter(x=>!abSeenN.has(x));
  const newP=presentPlaces.filter(x=>!abSeenP.has(x));
  newN.forEach(x=>abSeenN.add(x)); newP.forEach(x=>abSeenP.add(x));
  if(newN.length || newP.length){
    const parts=[];
    if(newN.length) parts.push("인물 "+newN.length);
    if(newP.length) parts.push("장소 "+newP.length);
    showAnalyze(parts.join(" · ")+" 추가");
  }
}
let abSeenN=new Set(), abSeenP=new Set(), abTimer=null;
function showAnalyze(msg){            // 추가 알림 → 4초 뒤 사라짐
  const ab=document.getElementById("wAnalyze"); if(!ab) return;
  ab.textContent=msg; ab.classList.add("show");
  clearTimeout(abTimer);
  abTimer=setTimeout(()=>{ const a=document.getElementById("wAnalyze"); if(a){ a.classList.remove("show"); } }, 4000);
}
function onBodyInput(){ updateCount(); autoGrow(document.getElementById("wBody")); renderHL(); }
function openManuscript(){ document.getElementById("fileImport").click(); }   // 폴더/파일 열기
function onImport(input){
  const f=input.files&&input.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    const t=document.getElementById("wTitle"), b=document.getElementById("wBody");
    if(t){ t.value=f.name.replace(/\.[^.]+$/,""); }
    if(b){ b.value=r.result; }
    state.typed=false; updateCount(); autoGrow(b); renderHL();
  };
  r.readAsText(f);
  input.value="";
}
function syncMain(){
  const v=document.querySelector('.v-video');
  if(v) v.className='v-video '+(state.gen[SCENES[state.scene].no]?'gen-fill':'ph-dark');
}
function selScene(i){            // 씬 전환: 전체 재렌더 없이 좌측 패널/썸네일만 갱신
  state.scene=i;
  document.querySelectorAll('.v-strip .sc').forEach((el,idx)=>el.classList.toggle('sel', idx===i));
  const p=document.querySelector('.v-panel'); if(p) p.innerHTML=vPanel();
  syncMain(); save();
}
function genScene(){
  const idx=state.scene, no=SCENES[idx].no;
  if(state.genLoading[no] || state.gen[no]) return;  // 이미 생성 중이거나 완료면 무시
  state.genLoading[no]=true;                          // 생성 중 → 버튼 disabled
  const p=document.querySelector('.v-panel'); if(p) p.innerHTML=vPanel();
  setTimeout(()=>{                                     // 생성 완료
    state.genLoading[no]=false; state.gen[no]=true;
    const sc=document.querySelectorAll('.v-strip .sc')[idx]; if(sc){ sc.classList.remove('ph-dark'); sc.classList.add('gen-fill'); }
    if(state.base==="video" && !state.overlay && state.scene===idx){
      const p2=document.querySelector('.v-panel'); if(p2) p2.innerHTML=vPanel();
      syncMain();
    }
    save();
  }, 1600);
}

/* ===== 키보드 단축키 ===== */
document.addEventListener("keydown",e=>{
  if(e.key==="Escape" && state.overlay==="preview"){ closeOverlay(); return; }
  if(!state.overlay && state.base==="video"){
    if(e.key==="ArrowRight") selScene(Math.min(state.scene+1,6));
    if(e.key==="ArrowLeft")  selScene(Math.max(state.scene-1,0));
  }
});

/* 새로고침 시 저장된 화면 복원 (없으면 write로 시작) */
try{
  const saved=JSON.parse(sessionStorage.getItem("ssg-demo")||"null");
  if(saved){
    state.base=saved.base||"write";
    state.overlay=saved.overlay==="loading"?null:(saved.overlay||null);
    state.scene=saved.scene||0;
    state.gen=saved.gen||{};
    state.typed=!!saved.typed;
  }
}catch(e){}
history.replaceState({base:state.base, overlay:state.overlay}, "");
render();
</script>
